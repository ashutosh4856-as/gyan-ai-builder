<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gyan AI — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#080810;--bg2:#0d0d1a;--card:#111120;--card2:#181830;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--accent:#6366f1;--al:#818cf8;--a2:#ec4899;--a3:#06b6d4;--text:#f1f5f9;--t2:#94a3b8;--t3:#475569;--success:#10b981;--warn:#f59e0b;--err:#ef4444}
    [data-theme="light"]{--bg:#f8f8fc;--bg2:#f0f0f8;--card:#ffffff;--card2:#f4f4fb;--border:rgba(0,0,0,0.06);--border2:rgba(0,0,0,0.11);--text:#0f0f1a;--t2:#475569;--t3:#94a3b8}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;transition:background .3s,color .3s}

    /* TOP BAR */
    .topbar{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px}
    .tb-left{display:flex;align-items:center;gap:12px}
    .logo{display:flex;align-items:center;gap:7px;font-size:.95rem;font-weight:800;letter-spacing:-.3px;text-decoration:none;color:var(--text)}
    .lmark{width:26px;height:26px;background:linear-gradient(135deg,var(--accent),var(--a2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
    .proj-name{font-size:.82rem;font-weight:600;color:var(--t2);padding:4px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--card);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
    .tb-tabs{display:flex;gap:2px;background:var(--card);border-radius:9px;padding:3px;border:1px solid var(--border)}
    .tab{padding:5px 14px;border-radius:7px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--t2);font-family:inherit;transition:all .2s;white-space:nowrap}
    .tab.active{background:var(--accent);color:#fff}
    .tb-right{display:flex;align-items:center;gap:8px}
    .tt{width:30px;height:30px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;transition:all .2s}
    .tt:hover{color:var(--text);border-color:var(--accent)}
    .pub-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 0 16px rgba(99,102,241,.3);white-space:nowrap}
    .pub-btn:hover{opacity:.85;transform:scale(1.02)}
    .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--a2));display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;cursor:pointer;flex-shrink:0}

    /* MAIN LAYOUT */
    .main{display:flex;flex:1;overflow:hidden}

    /* LEFT SIDEBAR */
    .sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
    .sb-section{padding:12px 10px 4px}
    .sb-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);padding:0 6px;margin-bottom:4px}
    .sb-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:500;color:var(--t2);transition:all .2s;border:none;background:transparent;font-family:inherit;width:100%;text-align:left}
    .sb-item:hover{background:var(--card2);color:var(--text)}
    .sb-item.active{background:rgba(99,102,241,.12);color:var(--al)}
    .sb-icon{width:16px;text-align:center;font-size:.85rem;flex-shrink:0}
    .sb-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:99px}
    .credit-box{margin:10px;padding:12px;border-radius:10px;background:var(--card);border:1px solid var(--border)}
    .cr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .cr-label{font-size:.72rem;font-weight:600;color:var(--t2)}
    .cr-val{font-size:.72rem;font-weight:700;color:var(--al)}
    .cr-bar{height:4px;background:var(--border2);border-radius:99px;overflow:hidden}
    .cr-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--a2));border-radius:99px;width:40%}
    .cr-sub{font-size:.65rem;color:var(--t3);margin-top:6px}
    .upgrade-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px;border-radius:8px;border:none;background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(236,72,153,.08));color:var(--al);font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit;width:calc(100% - 20px);margin:0 10px 10px;border:1px solid rgba(99,102,241,.2);transition:all .2s}
    .upgrade-btn:hover{background:linear-gradient(135deg,rgba(99,102,241,.25),rgba(236,72,153,.15))}

    /* CENTER - EDITOR */
    .editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

    /* FILE TABS */
    .file-tabs{display:flex;align-items:center;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 12px;height:36px;overflow-x:auto;flex-shrink:0}
    .file-tab{display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:.75rem;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
    .file-tab.active{color:var(--text);border-bottom-color:var(--accent)}
    .file-tab:hover{color:var(--text)}
    .ft-dot{width:6px;height:6px;border-radius:50%;background:var(--a2)}

    /* CODE EDITOR */
    .code-editor{flex:1;display:flex;overflow:hidden}
    .line-nums{padding:16px 12px;background:var(--bg2);border-right:1px solid var(--border);text-align:right;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--t3);line-height:1.7;user-select:none;min-width:40px;overflow:hidden}
    .code-content{flex:1;padding:16px;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:.75rem;line-height:1.7;outline:none;white-space:pre;color:var(--text);tab-size:2}
    .code-content::-webkit-scrollbar{width:6px;height:6px}
    .code-content::-webkit-scrollbar-track{background:transparent}
    .code-content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
    .kw{color:#818cf8}.str{color:#4ade80}.fn{color:#fbbf24}.cm{color:#475569}.tg{color:#f472b6}.at{color:#06b6d4}.nm{color:#fb923c}

    /* GENERATING ANIMATION */
    .generating{display:none;padding:16px;font-family:'JetBrains Mono',monospace;font-size:.75rem;line-height:1.7}
    .generating.show{display:block}
    .gen-line{opacity:0;animation:genLine .3s ease forwards}
    @keyframes genLine{to{opacity:1}}
    .cursor-blink{display:inline-block;width:8px;height:14px;background:var(--accent);vertical-align:middle;animation:blink .8s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* BOTTOM STATUS BAR */
    .status-bar{height:24px;display:flex;align-items:center;gap:16px;padding:0 12px;background:var(--accent);font-size:.65rem;font-weight:500;color:rgba(255,255,255,.8);flex-shrink:0}
    .sb-item-s{display:flex;align-items:center;gap:4px}

    /* RIGHT PANEL */
    .right-panel{width:380px;display:flex;flex-direction:column;border-left:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
    @media(max-width:900px){.right-panel{width:300px}}
    @media(max-width:700px){.sidebar{display:none}.right-panel{width:260px}}

    /* PREVIEW HEADER */
    .preview-header{height:36px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--border);flex-shrink:0}
    .ph-tabs{display:flex;gap:2px}
    .ph-tab{padding:4px 10px;border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--t2);font-family:inherit;transition:all .2s}
    .ph-tab.active{background:var(--card2);color:var(--text)}
    .ph-actions{display:flex;gap:4px}
    .ph-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.7rem;transition:all .2s}
    .ph-btn:hover{color:var(--text);border-color:var(--accent)}

    /* PREVIEW FRAME */
    .preview-frame{flex:1;overflow:hidden;position:relative}
    .preview-iframe{width:100%;height:100%;border:none;background:#fff}
    .preview-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--t3)}
    .pe-icon{font-size:2rem;opacity:.4}
    .pe-text{font-size:.8rem;text-align:center;line-height:1.5;max-width:180px}

    /* CHAT */
    .chat-area{height:220px;display:flex;flex-direction:column;border-top:1px solid var(--border);flex-shrink:0}
    .chat-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
    .chat-msgs::-webkit-scrollbar{width:4px}
    .chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
    .msg{display:flex;gap:7px;align-items:flex-start}
    .msg-avatar{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;margin-top:1px}
    .msg-ai .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff}
    .msg-user .msg-avatar{background:var(--card2);color:var(--t2)}
    .msg-bubble{padding:7px 10px;border-radius:10px;font-size:.77rem;line-height:1.55;max-width:85%}
    .msg-ai .msg-bubble{background:var(--card);border:1px solid var(--border);color:var(--text)}
    .msg-user .msg-bubble{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.2);color:var(--text);margin-left:auto}
    .msg-user{flex-direction:row-reverse}
    .chat-input-area{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:6px;align-items:flex-end}
    .chat-input{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:.78rem;resize:none;outline:none;min-height:34px;max-height:80px;line-height:1.5;transition:border-color .2s}
    .chat-input:focus{border-color:rgba(99,102,241,.4)}
    .chat-input::placeholder{color:var(--t3)}
    .chat-send{width:32px;height:32px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;transition:all .2s}
    .chat-send:hover{opacity:.85;transform:scale(1.05)}

    /* MODALS */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:500;align-items:center;justify-content:center;padding:16px}
    .overlay.open{display:flex}
    .modal{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:28px;width:100%;max-width:480px;position:relative;box-shadow:0 32px 80px rgba(0,0,0,.5);animation:min .25s cubic-bezier(.175,.885,.32,1.275) both}
    @keyframes min{from{opacity:0;transform:scale(.93) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .mc{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .2s}
    .mc:hover{color:var(--text);background:var(--card2)}
    .modal h2{font-size:1.1rem;font-weight:800;margin-bottom:6px;letter-spacing:-.3px}
    .modal-sub{font-size:.8rem;color:var(--t2);margin-bottom:20px}

    /* PUBLISH MODAL */
    .url-preview{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--al);margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .url-input-row{display:flex;align-items:center;gap:0;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;overflow:hidden;margin-bottom:16px;transition:border-color .2s}
    .url-input-row:focus-within{border-color:rgba(99,102,241,.4)}
    .url-prefix{padding:10px 12px;font-size:.8rem;color:var(--t3);white-space:nowrap;border-right:1px solid var(--border2);font-family:'JetBrains Mono',monospace}
    .url-field{flex:1;padding:10px 12px;background:transparent;border:none;outline:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem}
    .url-suffix{padding:10px 12px;font-size:.8rem;color:var(--t3);border-left:1px solid var(--border2);font-family:'JetBrains Mono',monospace;white-space:nowrap}
    .url-status{font-size:.72rem;color:var(--success);display:flex;align-items:center;gap:5px;margin-bottom:16px}
    .pub-options{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
    .pub-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);cursor:pointer;transition:all .2s}
    .pub-opt:hover{border-color:var(--accent)}
    .pub-opt.selected{border-color:var(--accent);background:rgba(99,102,241,.08)}
    .pub-opt-icon{font-size:1.1rem}
    .pub-opt-text{flex:1}
    .pub-opt-name{font-size:.82rem;font-weight:600}
    .pub-opt-desc{font-size:.71rem;color:var(--t2);margin-top:1px}
    .pub-opt-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center}
    .pub-opt.selected .pub-opt-radio{border-color:var(--accent);background:var(--accent)}
    .pub-opt.selected .pub-opt-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff}
    .pub-final-btn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 4px 16px rgba(99,102,241,.3)}
    .pub-final-btn:hover{opacity:.88;transform:scale(1.01)}

    /* PAYMENT MODAL */
    .plan-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .pc{padding:14px;border-radius:12px;border:2px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .2s}
    .pc:hover,.pc.sel{border-color:var(--accent);background:rgba(99,102,241,.07)}
    .pc-name{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:6px}
    .pc-price{font-size:1.4rem;font-weight:900;letter-spacing:-1px;margin-bottom:2px}
    .pc-period{font-size:.7rem;color:var(--t3)}
    .pc-features{margin-top:8px;display:flex;flex-direction:column;gap:4px}
    .pc-f{font-size:.72rem;color:var(--t2);display:flex;align-items:center;gap:5px}
    .pc-f::before{content:'✓';color:var(--success);font-size:.65rem}
    .upi-section{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:16px}
    .upi-title{font-size:.78rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
    .upi-apps{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .upi-app{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--card);cursor:pointer;transition:all .2s;font-size:.7rem;font-weight:500;color:var(--t2)}
    .upi-app:hover{border-color:var(--accent);color:var(--text)}
    .upi-app-icon{font-size:1.4rem}
    .upi-note{font-size:.7rem;color:var(--t3);line-height:1.5}
    .upi-manual{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
    .upi-manual-title{font-size:.72rem;font-weight:600;color:var(--t2);margin-bottom:6px}
    .upi-id{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--al);background:var(--card);padding:8px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px}
    .utr-input{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--card);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem;outline:none;margin-bottom:8px;transition:border-color .2s}
    .utr-input:focus{border-color:rgba(99,102,241,.4)}
    .utr-input::placeholder{color:var(--t3)}
    .verify-btn{width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
    .verify-btn:hover{opacity:.85}

    /* PROFILE DROPDOWN */
    .profile-drop{position:absolute;top:52px;right:12px;background:var(--card);border:1px solid var(--border2);border-radius:14px;width:220px;padding:8px;z-index:200;box-shadow:0 16px 40px rgba(0,0,0,.3);animation:min .2s ease both}
    .profile-drop.hidden{display:none}
    .pd-user{padding:10px 10px 12px;border-bottom:1px solid var(--border);margin-bottom:6px}
    .pd-name{font-size:.85rem;font-weight:700}
    .pd-email{font-size:.72rem;color:var(--t2);margin-top:2px}
    .pd-plan{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;background:rgba(99,102,241,.12);color:var(--al);font-size:.65rem;font-weight:700;margin-top:6px}
    .pd-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:.78rem;color:var(--t2);transition:all .2s}
    .pd-item:hover{background:var(--card2);color:var(--text)}
    .pd-item.danger{color:var(--err)}
    .pd-item.danger:hover{background:rgba(239,68,68,.08)}
    .pd-sep{height:1px;background:var(--border);margin:4px 0}

    /* APPS GRID (My Apps view) */
    .apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:16px;overflow-y:auto}
    .app-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s}
    .app-card:hover{border-color:rgba(99,102,241,.3);transform:translateY(-2px)}
    .app-thumb{height:100px;background:linear-gradient(135deg,var(--card2),var(--bg2));display:flex;align-items:center;justify-content:center;font-size:2rem;border-bottom:1px solid var(--border)}
    .app-info{padding:10px 12px}
    .app-name{font-size:.82rem;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .app-url{font-size:.68rem;color:var(--al);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .app-meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
    .app-status{display:flex;align-items:center;gap:4px;font-size:.67rem;font-weight:600}
    .status-live{color:var(--success)}.status-live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--success);display:inline-block;margin-right:3px;animation:pp 2s infinite}
    @keyframes pp{0%,100%{opacity:1}50%{opacity:.3}}
    .app-date{font-size:.65rem;color:var(--t3)}

    /* GITHUB DEPLOY VIEW */
    .github-view{padding:16px;overflow-y:auto;flex:1}
    .gh-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .gh-title{font-size:.95rem;font-weight:700}
    .gh-sub{font-size:.78rem;color:var(--t2);margin-bottom:16px}
    .repo-list{display:flex;flex-direction:column;gap:8px}
    .repo-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s}
    .repo-item:hover{border-c
